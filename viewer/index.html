<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>GLSL Viewer</title>
    <style>
        body { 
            margin: 0; 
            overflow: hidden; 
            background: #000; 
            font-family: monospace;
        }
        canvas { 
            width: 100vw; 
            height: 100vh; 
            display: block; 
        }
        #info {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(0,0,0,0.8);
            color: #0f0;
            padding: 10px;
            font-size: 12px;
            border: 1px solid #0f0;
        }
        #error { 
            position: absolute; 
            top: 10px; 
            left: 10px; 
            color: #ff3333; 
            background: rgba(0,0,0,0.95);
            padding: 15px;
            max-width: 60%;
            display: none;
            border-left: 4px solid #ff3333;
            white-space: pre-wrap;
        }
        #reload-notice {
            position: absolute;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255,255,255,0.9);
            color: #000;
            padding: 8px 16px;
            border-radius: 4px;
            display: none;
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <div id="info">
        <div>FPS: <span id="fps">60</span></div>
        <div>Time: <span id="time">0.0</span>s</div>
        <div style="margin-top: 5px; font-size: 10px; color: #888;">
            Edit shader.frag and refresh (F5)
        </div>
    </div>
    <div id="error"></div>
    <div id="reload-notice">Shader reloaded!</div>
    <script type="module" src="main.js"></script>
</body>
</html>
